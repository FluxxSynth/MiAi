<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MiAi Chat</title>
<style>
  :root {
    --bg:       #1a1a2e;
    --surface:  #16213e;
    --card:     #0f3460;
    --accent:   #e94560;
    --text:     #eaeaea;
    --muted:    #888;
    --user-bg:  #0f3460;
    --bot-bg:   #1a2744;
    --radius:   12px;
    --font:     'Segoe UI', system-ui, sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg); color: var(--text);
    font-family: var(--font); height: 100dvh;
    display: flex; flex-direction: column;
  }

  header {
    background: var(--surface); border-bottom: 1px solid #ffffff18;
    padding: 12px 20px; display: flex; align-items: center; gap: 12px;
  }
  header h1 { font-size: 1.1rem; font-weight: 600; }
  header .model-badge {
    background: var(--card); color: var(--accent);
    padding: 2px 10px; border-radius: 20px; font-size: .75rem;
    margin-left: auto;
  }

  /* persona picker */
  .persona-row {
    background: var(--surface); padding: 6px 16px;
    display: flex; gap: 8px; border-bottom: 1px solid #ffffff10;
  }
  .persona-row button {
    background: none; border: 1px solid #ffffff25; color: var(--muted);
    border-radius: 20px; padding: 3px 12px; font-size: .78rem; cursor: pointer;
    transition: all .15s;
  }
  .persona-row button.active {
    background: var(--card); border-color: var(--accent); color: var(--text);
  }

  #messages {
    flex: 1; overflow-y: auto; padding: 20px 16px;
    display: flex; flex-direction: column; gap: 14px;
  }

  .msg { display: flex; gap: 10px; max-width: 780px; width: 100%; }
  .msg.user { margin-left: auto; flex-direction: row-reverse; }

  .avatar {
    width: 34px; height: 34px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 1rem; flex-shrink: 0;
    background: var(--card);
  }
  .msg.user .avatar { background: var(--accent); }

  .bubble {
    background: var(--bot-bg); border-radius: var(--radius);
    padding: 10px 14px; line-height: 1.6; font-size: .92rem;
    max-width: calc(100% - 50px);
    white-space: pre-wrap; word-break: break-word;
  }
  .msg.user .bubble { background: var(--user-bg); }

  .meta { font-size: .7rem; color: var(--muted); margin-top: 4px; }

  /* typing indicator */
  .typing-dots span {
    display: inline-block; width: 7px; height: 7px; margin: 0 2px;
    background: var(--muted); border-radius: 50%;
    animation: bounce .9s infinite;
  }
  .typing-dots span:nth-child(2) { animation-delay: .15s; }
  .typing-dots span:nth-child(3) { animation-delay: .30s; }
  @keyframes bounce {
    0%,80%,100% { transform: translateY(0); }
    40%         { transform: translateY(-6px); }
  }

  /* input bar */
  footer {
    background: var(--surface); border-top: 1px solid #ffffff18;
    padding: 12px 16px; display: flex; gap: 10px;
  }
  #input {
    flex: 1; background: var(--bg); color: var(--text);
    border: 1px solid #ffffff20; border-radius: var(--radius);
    padding: 10px 14px; font-size: .92rem; font-family: inherit;
    resize: none; min-height: 42px; max-height: 160px;
  }
  #input:focus { outline: none; border-color: var(--accent); }

  .btn {
    background: var(--accent); color: #fff; border: none;
    border-radius: var(--radius); padding: 0 18px; font-size: .9rem;
    cursor: pointer; transition: opacity .15s;
  }
  .btn:disabled { opacity: .4; cursor: not-allowed; }
  .btn.secondary {
    background: var(--card); font-size: .8rem; padding: 0 12px;
  }

  /* scrollbar */
  #messages::-webkit-scrollbar { width: 5px; }
  #messages::-webkit-scrollbar-thumb { background: #ffffff20; border-radius: 4px; }
</style>
</head>
<body>

<header>
  <div class="avatar" style="background:var(--accent)">🤖</div>
  <h1>MiAi</h1>
  <span class="model-badge" id="modelBadge">loading…</span>
  <button class="btn secondary" onclick="resetConv()">Reset</button>
  <button class="btn secondary" onclick="saveConv()">Save</button>
</header>

<div class="persona-row" id="personaRow">
  <span style="font-size:.78rem;color:var(--muted);align-self:center">Persona:</span>
  <button class="active" onclick="setPersona('assistant',this)">Assistant</button>
  <button onclick="setPersona('tutor',this)">Tutor</button>
  <button onclick="setPersona('coder',this)">Coder</button>
  <button onclick="setPersona('creative',this)">Creative</button>
</div>

<div id="messages">
  <div class="msg">
    <div class="avatar">🤖</div>
    <div>
      <div class="bubble">Hello! How can I help you today?</div>
    </div>
  </div>
</div>

<footer>
  <textarea id="input" placeholder="Type a message… (Enter to send, Shift+Enter for newline)"
            rows="1" onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
  <button class="btn" id="sendBtn" onclick="sendMessage()">Send</button>
</footer>

<script>
// ── State ─────────────────────────────────────────────────────────────────
let isGenerating = false;

// ── Init ──────────────────────────────────────────────────────────────────
fetch('/api/info').then(r => r.json()).then(d => {
  document.getElementById('modelBadge').textContent = d.model;
});

// ── Helpers ───────────────────────────────────────────────────────────────
function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 160) + 'px';
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

function scrollToBottom() {
  const m = document.getElementById('messages');
  m.scrollTop = m.scrollHeight;
}

function addMessage(role, text, meta = '') {
  const msgs = document.getElementById('messages');
  const div  = document.createElement('div');
  div.className = 'msg ' + role;
  const avatarChar = role === 'user' ? '🧑' : '🤖';
  div.innerHTML = `
    <div class="avatar">${avatarChar}</div>
    <div>
      <div class="bubble">${escapeHtml(text)}</div>
      ${meta ? `<div class="meta">${meta}</div>` : ''}
    </div>`;
  msgs.appendChild(div);
  scrollToBottom();
  return div.querySelector('.bubble');
}

function addTypingIndicator() {
  const msgs = document.getElementById('messages');
  const div  = document.createElement('div');
  div.className = 'msg';
  div.id = 'typing';
  div.innerHTML = `
    <div class="avatar">🤖</div>
    <div><div class="bubble typing-dots">
      <span></span><span></span><span></span>
    </div></div>`;
  msgs.appendChild(div);
  scrollToBottom();
}

function removeTypingIndicator() {
  const el = document.getElementById('typing');
  if (el) el.remove();
}

function escapeHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;')
          .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function setDisabled(v) {
  document.getElementById('sendBtn').disabled = v;
  document.getElementById('input').disabled   = v;
  isGenerating = v;
}

// ── Send ──────────────────────────────────────────────────────────────────
async function sendMessage() {
  if (isGenerating) return;
  const inputEl = document.getElementById('input');
  const msg = inputEl.value.trim();
  if (!msg) return;

  inputEl.value = '';
  autoResize(inputEl);
  addMessage('user', msg);
  setDisabled(true);
  addTypingIndicator();

  try {
    const resp = await fetch('/api/chat', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ message: msg, stream: true }),
    });

    if (resp.headers.get('Content-Type')?.includes('text/event-stream')) {
      // ── SSE streaming ────────────────────────────────────────────────
      removeTypingIndicator();
      const botBubble = addBotBubble();
      let fullText = '';

      const reader = resp.body.getReader();
      const decoder = new TextDecoder();
      let buf = '';

      while (true) {
        const { value, done } = await reader.read();
        if (done) break;
        buf += decoder.decode(value, { stream: true });
        const lines = buf.split('\n');
        buf = lines.pop(); // keep incomplete line

        for (const line of lines) {
          if (!line.startsWith('data: ')) continue;
          const payload = JSON.parse(line.slice(6));
          if (payload.token !== undefined) {
            fullText += payload.token;
            botBubble.textContent = fullText;
            scrollToBottom();
          } else if (payload.done) {
            const meta = `${payload.tokens} tokens · ${payload.ms}ms`;
            botBubble.parentElement.insertAdjacentHTML(
              'beforeend', `<div class="meta">${meta}</div>`
            );
          } else if (payload.error) {
            botBubble.textContent = '⚠️ ' + payload.error;
          }
        }
      }
    } else {
      // ── Blocking JSON response ────────────────────────────────────────
      removeTypingIndicator();
      const data = await resp.json();
      if (data.error) {
        addMessage('', '⚠️ ' + data.error);
      } else {
        const meta = `${data.tokens} tokens · ${data.ms}ms`;
        addMessage('bot', data.response, meta);
      }
    }
  } catch (err) {
    removeTypingIndicator();
    addMessage('', '⚠️ Network error: ' + err.message);
  } finally {
    setDisabled(false);
    document.getElementById('input').focus();
  }
}

function addBotBubble() {
  const msgs = document.getElementById('messages');
  const div  = document.createElement('div');
  div.className = 'msg';
  div.innerHTML = `<div class="avatar">🤖</div><div><div class="bubble"></div></div>`;
  msgs.appendChild(div);
  scrollToBottom();
  return div.querySelector('.bubble');
}

// ── Controls ──────────────────────────────────────────────────────────────
async function resetConv() {
  await fetch('/api/reset', { method: 'POST' });
  document.getElementById('messages').innerHTML = '';
  addMessage('bot', 'Conversation cleared. How can I help?');
}

async function saveConv() {
  await fetch('/api/save', { method: 'POST' });
  // brief flash on the save button
  const btn = event.target;
  btn.textContent = 'Saved ✓';
  setTimeout(() => btn.textContent = 'Save', 1500);
}

async function setPersona(name, btn) {
  await fetch('/api/persona', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({ persona: name }),
  });
  document.querySelectorAll('.persona-row button').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}
</script>
</body>
</html>
